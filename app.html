<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#034aad">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LM Consig</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- Redirecionamento via meta tag como fallback -->
    <meta http-equiv="refresh" content="1;url=https://script.google.com/macros/s/AKfycbw1O5IXNRp6FOpQlsoUclx_4rn4HHIslnBIEpTCKJMpv0ESS0mpNg3DcJ6p1RFE8Q51/exec">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #034aad 0%, #023a8a 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; min-height: 100vh;
        }
        .logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 16px; opacity: 0.9; margin-bottom: 20px; }
        .manual-btn {
            margin-top: 10px;
            background: white;
            color: #034aad;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: none;
        }
    </style>
</head>
<body>
    <img src="icon-192.png" alt="Logo" class="logo">
    <div class="spinner"></div>
    <p class="loading-text">Carregando...</p>
    <a class="manual-btn" id="manualBtn"
       href="https://script.google.com/macros/s/AKfycbw1O5IXNRp6FOpQlsoUclx_4rn4HHIslnBIEpTCKJMpv0ESS0mpNg3DcJ6p1RFE8Q51/exec">
       🚀 Abrir App
    </a>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbw1O5IXNRp6FOpQlsoUclx_4rn4HHIslnBIEpTCKJMpv0ESS0mpNg3DcJ6p1RFE8Q51/exec';

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        // Tenta redirecionar de 3 formas diferentes
        try {
            window.location.replace(URL);
        } catch(e) {
            window.location.href = URL;
        }

        // Se após 3 segundos ainda não redirecionou, mostra botão manual
        setTimeout(() => {
            document.getElementById('manualBtn').style.display = 'inline-block';
            document.querySelector('.loading-text').textContent = 'Toque para abrir:';
            document.querySelector('.spinner').style.display = 'none';
        }, 3000);
    </script>
</body>
</html>
